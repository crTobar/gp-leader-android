name: Presencia
options:
  bundleIdPrefix: com.presencia
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: minimal

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  LucideIcons:
    url: https://github.com/JakubMazur/lucide-icons-swift
    from: "0.577.0"

targets:
  Presencia:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Presencia
        excludes:
          - "**/*.md"
          - "Config.example.swift"
    resources:
      - path: Presencia/Assets.xcassets
        optional: true
      - path: Presencia/Preview Content
        optional: true
        buildPhase: none
      - path: Presencia/Fonts
        optional: true
    info:
      path: Presencia/Info.plist
      properties:
        CFBundleName: Presencia
        CFBundleDisplayName: Presencia
        CFBundleIdentifier: com.presencia.app
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "Para adjuntar fotos a los reportes."
        NSPhotoLibraryUsageDescription: "Para adjuntar fotos a los reportes."
        UIAppFonts:
          - DMSans-Regular.ttf
          - DMSans-Medium.ttf
          - DMSans-SemiBold.ttf
          - DMSans-Bold.ttf
          - DMMono-Regular.ttf
          - DMMono-Medium.ttf
          - CormorantGaramond-Regular.ttf
          - CormorantGaramond-Italic.ttf
    dependencies:
      - package: Supabase
        product: Supabase
      - package: LucideIcons
        product: LucideIcons
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.presencia.app
        INFOPLIST_FILE: Presencia/Info.plist
        SWIFT_STRICT_CONCURRENCY: minimal
